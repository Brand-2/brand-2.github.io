<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Create Account | Brand 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .glass-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.15);
            border-radius: 2rem;
            width: 100%;
            max-width: 480px;
            max-height: 98vh;
            overflow-y: auto;
        }
        
        .glass-card::-webkit-scrollbar {
            width: 4px;
        }
        
        .glass-card::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .glass-card::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.3);
            border-radius: 2px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .btn-secondary:active {
            transform: scale(0.98);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            border-radius: 1rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .input-field.error {
            border-color: #ef4444;
        }
        
        .input-field.success {
            border-color: #10b981;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s ease;
            z-index: 1000;
            max-width: 90%;
            width: 100%;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            cursor: pointer;
            transition: color 0.2s ease;
            background: transparent;
            border: none;
            font-size: 1.1rem;
        }
        
        .password-toggle:hover {
            color: #9ca3af;
        }
        
        .step-indicator {
            transition: all 0.3s ease;
        }
        
        .step-active {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }
        
        .step-completed {
            background: #059669;
            color: white;
        }
        
        .step-inactive {
            background: rgba(255, 255, 255, 0.08);
            color: #6b7280;
            border-color: rgba(255, 255, 255, 0.1);
        }
        
        .social-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .social-btn:active {
            transform: scale(0.97);
        }
        
        @media (max-width: 480px) {
            .glass-card {
                margin: 0.5rem;
                padding: 1.25rem !important;
            }
        }
        
        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 2px solid #10b981;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        
        .strength-bar {
            height: 3px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
            margin-top: 6px;
        }
        
        .strength-fill {
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }
        
        .password-hint {
            font-size: 0.7rem;
            color: #6b7280;
            margin-top: 4px;
        }
        
        .feature-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.15);
            border-radius: 2rem;
            font-size: 0.75rem;
            color: #9ca3af;
        }
        
        .feature-badge.active {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: #34d399;
        }
    </style>
</head>
<body>
    <div class="glass-card p-5 md:p-8 fade-in">
        <!-- Logo -->
        <div class="text-center mb-5 md:mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 md:w-14 md:h-14 bg-emerald-500 rounded-2xl mb-3">
                <span class="text-xl md:text-2xl font-black text-white">B</span>
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-white mb-1">Create Account</h1>
            <p class="text-gray-400 text-xs md:text-sm">One account. Advertise. Influence. Earn.</p>
        </div>

        <!-- Step 1: Personal Information -->
        <div id="step1" class="step-content">
            <div class="flex flex-wrap gap-2 justify-center mb-4">
                <span class="feature-badge active">📢 Advertise</span>
                <span class="feature-badge active">👥 Influence</span>
                <span class="feature-badge active">💰 Earn</span>
            </div>
            
            <p class="text-gray-400 text-sm mb-4 text-center">Tell us about yourself</p>
            
            <form id="register-form" class="space-y-3">
                <div>
                    <label class="block text-gray-300 text-xs font-medium mb-1">Full Name *</label>
                    <input type="text" id="full-name" required
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-base"
                        placeholder="John Doe">
                </div>
                
                <div>
                    <label class="block text-gray-300 text-xs font-medium mb-1">Email Address *</label>
                    <input type="email" id="email" required
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-base"
                        placeholder="you@example.com">
                </div>
                
                <div>
                    <label class="block text-gray-300 text-xs font-medium mb-1">Phone Number *</label>
                    <input type="tel" id="phone" required
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-base"
                        placeholder="0771234567">
                </div>
                
                <div>
                    <label class="block text-gray-300 text-xs font-medium mb-1">Password *</label>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-base pr-12"
                            placeholder="Minimum 6 characters">
                        <button type="button" onclick="togglePassword()" class="password-toggle text-base">
                            👁️
                        </button>
                    </div>
                    <div id="password-strength" class="strength-bar">
                        <div id="strength-fill" class="strength-fill" style="width: 0%"></div>
                    </div>
                    <p id="password-hint" class="password-hint">Use 6+ characters with letters and numbers</p>
                </div>
                
                <div>
                    <label class="block text-gray-300 text-xs font-medium mb-1">Confirm Password *</label>
                    <input type="password" id="confirm-password" required
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-base"
                        placeholder="Re-enter your password">
                    <p id="confirm-hint" class="password-hint hidden">Passwords do not match</p>
                </div>
                
                <!-- Terms -->
                <label class="flex items-start gap-2 mt-2">
                    <input type="checkbox" id="terms" class="mt-0.5 w-4 h-4">
                    <span class="text-xs text-gray-400">I agree to the <a href="#" class="text-emerald-500">Terms of Service</a> and <a href="#" class="text-emerald-500">Privacy Policy</a></span>
                </label>
                
                <button type="submit" id="register-btn" class="btn-primary w-full py-3 rounded-xl text-white font-semibold text-base mt-2">
                    Create Account →
                </button>
            </form>
            
            <!-- Divider -->
            <div class="relative my-5">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-700"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-3 bg-transparent text-gray-500">Or continue with</span>
                </div>
            </div>
            
            <!-- Social Signup -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="socialSignup('google')" class="social-btn py-2.5 rounded-lg text-gray-300 text-sm font-medium flex items-center justify-center gap-2">
                    <span>🔵</span> Google
                </button>
                <button onclick="socialSignup('apple')" class="social-btn py-2.5 rounded-lg text-gray-300 text-sm font-medium flex items-center justify-center gap-2">
                    <span>⚫</span> Apple
                </button>
            </div>
        </div>

        <!-- Already have account -->
        <p class="text-center text-gray-400 text-xs mt-4">
            Already have an account? 
            <a href="login.html" class="text-emerald-500 font-semibold hover:text-emerald-400 transition">Sign In</a>
        </p>
        
        <!-- Back to Home -->
        <p class="text-center text-gray-500 text-xs mt-2">
            <a href="index.html" class="hover:text-gray-300 transition">← Back to Home</a>
        </p>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast bg-gray-900 text-white px-5 py-3 rounded-xl shadow-xl flex items-center gap-3">
        <span id="toast-icon"></span>
        <span id="toast-message" class="text-sm"></span>
    </div>

    <script>
        const SUPABASE_URL = 'https://kqyyhjudshjeztdlpmoa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxeXloanVkc2hqZXp0ZGxwbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjAzMzEsImV4cCI6MjA5NTkzNjMzMX0.w8uypyF_qEp5nesKGro8x8lET7lI8rzU5MxsIKf_jxQ';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let isSubmitting = false;
        
        // DOM Elements
        const fullNameInput = document.getElementById('full-name');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const confirmHint = document.getElementById('confirm-hint');
        const termsCheckbox = document.getElementById('terms');
        const registerBtn = document.getElementById('register-btn');
        const form = document.getElementById('register-form');
        
        // Toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            document.getElementById('toast-icon').innerHTML = icons[type] || icons.info;
            document.getElementById('toast-message').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
        
        // Toggle Password
        function togglePassword() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            const btn = document.querySelector('#password + .password-toggle');
            btn.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        }
        
        // Password Strength
        passwordInput.addEventListener('input', function() {
            const value = this.value;
            const strengthFill = document.getElementById('strength-fill');
            const hint = document.getElementById('password-hint');
            
            let strength = 0;
            let message = '';
            let color = '';
            
            if (value.length === 0) {
                strength = 0;
                message = 'Enter a password';
                color = 'rgba(255,255,255,0.1)';
            } else if (value.length < 6) {
                strength = 25;
                message = 'Too short - minimum 6 characters';
                color = '#ef4444';
            } else if (value.length < 8) {
                strength = 50;
                message = 'Weak - add more characters';
                color = '#f59e0b';
            } else if (value.length < 10) {
                strength = 75;
                message = 'Good password';
                color = '#10b981';
            } else {
                strength = 100;
                message = 'Strong password!';
                color = '#34d399';
            }
            
            strengthFill.style.width = strength + '%';
            strengthFill.style.background = color;
            hint.textContent = message;
            hint.style.color = strength > 0 ? color : '#6b7280';
        });
        
        // Confirm Password
        confirmPasswordInput.addEventListener('input', function() {
            const value = this.value;
            const password = passwordInput.value;
            const hint = document.getElementById('confirm-hint');
            
            if (value && value !== password) {
                hint.classList.remove('hidden');
                this.classList.add('error');
                this.classList.remove('success');
            } else if (value && value === password) {
                hint.classList.add('hidden');
                this.classList.remove('error');
                this.classList.add('success');
            } else {
                hint.classList.add('hidden');
                this.classList.remove('error');
                this.classList.remove('success');
            }
        });
        
        // Social Signup
        async function socialSignup(provider) {
            showToast(`Redirecting to ${provider}...`, 'info');
            
            try {
                const { data, error } = await sb.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) {
                    showToast(error.message || `Failed to sign up with ${provider}`, 'error');
                }
            } catch (error) {
                console.error('Social signup error:', error);
                showToast('An error occurred. Please try again.', 'error');
            }
        }
        
        // Handle Registration
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            // Validate full name
            if (!fullName || fullName.length < 2) {
                showToast('Please enter your full name', 'warning');
                fullNameInput.classList.add('error');
                setTimeout(() => fullNameInput.classList.remove('error'), 3000);
                return;
            }
            
            // Validate email
            if (!email || !email.includes('@') || !email.includes('.')) {
                showToast('Please enter a valid email address', 'warning');
                emailInput.classList.add('error');
                setTimeout(() => emailInput.classList.remove('error'), 3000);
                return;
            }
            
            // Validate phone
            if (!phone || phone.length < 9) {
                showToast('Please enter a valid phone number', 'warning');
                phoneInput.classList.add('error');
                setTimeout(() => phoneInput.classList.remove('error'), 3000);
                return;
            }
            
            // Validate password
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'warning');
                passwordInput.classList.add('error');
                setTimeout(() => passwordInput.classList.remove('error'), 3000);
                return;
            }
            
            // Validate confirm password
            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'warning');
                confirmPasswordInput.classList.add('error');
                setTimeout(() => confirmPasswordInput.classList.remove('error'), 3000);
                return;
            }
            
            // Validate terms
            if (!termsCheckbox.checked) {
                showToast('Please agree to the Terms of Service', 'warning');
                termsCheckbox.classList.add('error');
                setTimeout(() => termsCheckbox.classList.remove('error'), 3000);
                return;
            }
            
            isSubmitting = true;
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loader"></span> Creating Account...';
            
            try {
                // Check if user already exists
                const { data: existingUser } = await sb
                    .from('profiles')
                    .select('email')
                    .eq('email', email)
                    .single();
                
                if (existingUser) {
                    showToast('Email already registered. Please login instead.', 'warning');
                    registerBtn.innerHTML = 'Create Account →';
                    registerBtn.disabled = false;
                    isSubmitting = false;
                    return;
                }
                
                // Sign up with Supabase Auth
                const { data: authData, error: signUpError } = await sb.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: fullName,
                            phone_number: phone
                        }
                    }
                });
                
                if (signUpError) {
                    if (signUpError.message.includes('already registered')) {
                        showToast('Email already registered. Please login instead.', 'warning');
                    } else {
                        showToast(signUpError.message || 'Registration failed. Please try again.', 'error');
                    }
                    registerBtn.innerHTML = 'Create Account →';
                    registerBtn.disabled = false;
                    isSubmitting = false;
                    return;
                }
                
                if (authData.user) {
                    // Create profile - unified, both advertiser and influencer by default
                    const { error: profileError } = await sb
                        .from('profiles')
                        .insert({
                            id: authData.user.id,
                            email: email,
                            full_name: fullName,
                            phone_number: phone,
                            is_advertiser: true,
                            is_influencer: true,
                            wallet_balance: 0,
                            is_active: true
                        });
                    
                    if (profileError) {
                        console.error('Profile creation error:', profileError);
                        showToast('Account created but profile setup failed. Please contact support.', 'warning');
                    }
                    
                    showToast('Account created successfully! Redirecting to dashboard...', 'success');
                    
                    // Sign in automatically
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
                
            } catch (error) {
                console.error('Registration error:', error);
                showToast(error.message || 'Registration failed. Please try again.', 'error');
                registerBtn.innerHTML = 'Create Account →';
                registerBtn.disabled = false;
                isSubmitting = false;
            }
        });
        
        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const active = document.activeElement;
                if (active && active.tagName === 'INPUT') {
                    form.dispatchEvent(new Event('submit'));
                }
            }
        });
        
        // Auto-focus first input
        fullNameInput.focus();
    </script>
</body>
</html>
