<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sign In | Brand 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .glass-card {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.15);
            border-radius: 2rem;
            width: 100%;
            max-width: 420px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.2);
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            border-radius: 1rem;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .input-field.error {
            border-color: #ef4444;
        }
        
        .input-field.success {
            border-color: #10b981;
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s ease;
            z-index: 1000;
            max-width: 90%;
            width: 100%;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            cursor: pointer;
            transition: color 0.2s ease;
            background: transparent;
            border: none;
            font-size: 1.1rem;
        }
        
        .password-toggle:hover {
            color: #9ca3af;
        }
        
        @media (max-width: 480px) {
            .glass-card {
                margin: 0.5rem;
                padding: 1.5rem !important;
            }
        }
        
        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 2px solid #10b981;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }
        
        .checkbox-custom {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }
        
        .checkbox-custom:checked {
            background: #10b981;
            border-color: #10b981;
        }
        
        .checkbox-custom:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        
        .social-btn {
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .social-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>
<body>
    <!-- Login Card -->
    <div class="glass-card p-6 md:p-8 fade-in">
        <!-- Logo -->
        <div class="text-center mb-6 md:mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 md:w-16 md:h-16 bg-emerald-500 rounded-2xl mb-4">
                <span class="text-2xl md:text-3xl font-black text-white">B</span>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold text-white mb-1">Welcome Back</h1>
            <p class="text-gray-400 text-xs md:text-sm">Sign in to your Brand 2 account</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-gray-300 text-sm font-medium mb-1.5">Email Address</label>
                <div class="relative">
                    <input type="email" id="email" name="email" required
                        class="input-field w-full px-4 py-3.5 rounded-xl text-white placeholder-gray-500 text-base"
                        placeholder="you@example.com" autocomplete="email">
                    <div class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500">
                        📧
                    </div>
                </div>
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="text-gray-300 text-sm font-medium">Password</label>
                    <a href="#" class="text-emerald-500 text-xs hover:text-emerald-400 transition" onclick="showForgotPassword(event)">Forgot?</a>
                </div>
                <div class="relative">
                    <input type="password" id="password" name="password" required
                        class="input-field w-full px-4 py-3.5 rounded-xl text-white placeholder-gray-500 text-base pr-12"
                        placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" onclick="togglePassword()" class="password-toggle text-base">
                        👁️
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 text-gray-400 cursor-pointer">
                    <input type="checkbox" id="remember-me" class="checkbox-custom">
                    <span>Remember me</span>
                </label>
                <span class="text-gray-500 text-xs">One account, all access</span>
            </div>

            <button type="submit" id="login-btn" class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold text-base transition">
                Sign In
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-700"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-3 bg-transparent text-gray-500">Or continue with</span>
            </div>
        </div>

        <!-- Social Login -->
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="socialLogin('google')" class="social-btn py-2.5 rounded-lg text-gray-300 text-sm font-medium flex items-center justify-center gap-2">
                <span>🔵</span> Google
            </button>
            <button onclick="socialLogin('apple')" class="social-btn py-2.5 rounded-lg text-gray-300 text-sm font-medium flex items-center justify-center gap-2">
                <span>⚫</span> Apple
            </button>
        </div>

        <!-- Sign Up Link -->
        <p class="text-center text-gray-400 text-sm">
            Don't have an account? 
            <a href="register.html" class="text-emerald-500 font-semibold hover:text-emerald-400 transition">
                Create Account →
            </a>
        </p>
        
        <!-- Back to Home -->
        <p class="text-center text-gray-500 text-xs mt-4">
            <a href="index.html" class="hover:text-gray-300 transition">← Back to Home</a>
        </p>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgot-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 hidden p-4">
        <div class="bg-gray-900 rounded-2xl p-6 max-w-md w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-white">Reset Password</h3>
                <button onclick="closeForgotModal()" class="text-gray-400 text-2xl hover:text-white transition">&times;</button>
            </div>
            <p class="text-gray-400 text-sm mb-4">Enter your email address and we'll send you a password reset link.</p>
            <input type="email" id="reset-email" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-500 text-base mb-4" placeholder="you@example.com">
            <div class="flex gap-3">
                <button onclick="sendResetLink()" class="flex-1 btn-primary py-3 rounded-xl text-white font-semibold">Send Reset Link</button>
                <button onclick="closeForgotModal()" class="flex-1 bg-gray-800 py-3 rounded-xl text-white font-semibold">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast bg-gray-900 text-white px-5 py-3 rounded-xl shadow-xl flex items-center gap-3">
        <span id="toast-icon"></span>
        <span id="toast-message" class="text-sm"></span>
    </div>

    <script>
        const SUPABASE_URL = 'https://kqyyhjudshjeztdlpmoa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxeXloanVkc2hqZXp0ZGxwbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjAzMzEsImV4cCI6MjA5NTkzNjMzMX0.w8uypyF_qEp5nesKGro8x8lET7lI8rzU5MxsIKf_jxQ';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let isSubmitting = false;
        
        // DOM Elements
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('login-btn');
        const form = document.getElementById('login-form');
        const rememberMe = document.getElementById('remember-me');
        
        // Toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            document.getElementById('toast-icon').innerHTML = icons[type] || icons.info;
            document.getElementById('toast-message').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }
        
        // Toggle Password Visibility
        function togglePassword() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            const btn = document.querySelector('.password-toggle');
            btn.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        }
        
        // Handle Login
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            
            if (!email || !password) {
                showToast('Please fill in all fields', 'warning');
                return;
            }
            
            // Basic email validation
            if (!email.includes('@') || !email.includes('.')) {
                showToast('Please enter a valid email address', 'warning');
                emailInput.classList.add('error');
                setTimeout(() => emailInput.classList.remove('error'), 3000);
                return;
            }
            
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'warning');
                passwordInput.classList.add('error');
                setTimeout(() => passwordInput.classList.remove('error'), 3000);
                return;
            }
            
            isSubmitting = true;
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loader"></span> Signing In...';
            
            try {
                // Sign in with Supabase
                const { data, error } = await sb.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    if (error.message.includes('Invalid login credentials')) {
                        showToast('Invalid email or password. Please try again.', 'error');
                        form.classList.add('shake');
                        setTimeout(() => form.classList.remove('shake'), 500);
                    } else if (error.message.includes('Email not confirmed')) {
                        showToast('Please confirm your email address first.', 'warning');
                    } else {
                        showToast(error.message || 'Login failed. Please try again.', 'error');
                    }
                    isSubmitting = false;
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                    return;
                }
                
                if (data.user) {
                    // Get user profile
                    const { data: profile, error: profileError } = await sb
                        .from('profiles')
                        .select('id, full_name, is_advertiser, is_influencer, wallet_balance')
                        .eq('id', data.user.id)
                        .single();
                    
                    if (profileError) {
                        // If profile doesn't exist, create one
                        if (profileError.code === 'PGRST116') {
                            const { error: createError } = await sb
                                .from('profiles')
                                .insert({
                                    id: data.user.id,
                                    email: email,
                                    full_name: email.split('@')[0],
                                    is_advertiser: true,
                                    is_influencer: true,
                                    wallet_balance: 0
                                });
                            
                            if (createError) {
                                showToast('Error creating profile. Please contact support.', 'error');
                            }
                        } else {
                            showToast('Error loading profile. Please try again.', 'error');
                        }
                        isSubmitting = false;
                        loginBtn.disabled = false;
                        loginBtn.textContent = 'Sign In';
                        return;
                    }
                    
                    // Set session storage if remember me is checked
                    if (rememberMe.checked) {
                        localStorage.setItem('remembered_email', email);
                    } else {
                        localStorage.removeItem('remembered_email');
                    }
                    
                    showToast('Login successful! Redirecting...', 'success');
                    
                    // Redirect to unified dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showToast('An unexpected error occurred. Please try again.', 'error');
                isSubmitting = false;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });
        
        // Social Login
        async function socialLogin(provider) {
            showToast(`Redirecting to ${provider}...`, 'info');
            
            try {
                const { data, error } = await sb.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) {
                    showToast(error.message || `Failed to sign in with ${provider}`, 'error');
                }
            } catch (error) {
                console.error('Social login error:', error);
                showToast('An error occurred. Please try again.', 'error');
            }
        }
        
        // Load remembered email
        const rememberedEmail = localStorage.getItem('remembered_email');
        if (rememberedEmail) {
            emailInput.value = rememberedEmail;
            rememberMe.checked = true;
        }
        
        // Check if already logged in
        async function checkExistingSession() {
            const { data: { user } } = await sb.auth.getUser();
            if (user) {
                const { data: profile } = await sb
                    .from('profiles')
                    .select('id')
                    .eq('id', user.id)
                    .single();
                
                if (profile) {
                    window.location.href = 'dashboard.html';
                }
            }
        }
        
        // Forgot Password
        function showForgotPassword(e) {
            e.preventDefault();
            document.getElementById('forgot-modal').classList.remove('hidden');
            document.getElementById('reset-email').value = emailInput.value || '';
        }
        
        function closeForgotModal() {
            document.getElementById('forgot-modal').classList.add('hidden');
        }
        
        async function sendResetLink() {
            const email = document.getElementById('reset-email').value.trim();
            
            if (!email) {
                showToast('Please enter your email address', 'warning');
                return;
            }
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Sending...';
            btn.disabled = true;
            
            try {
                const { error } = await sb.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html',
                });
                
                if (error) {
                    showToast(error.message, 'error');
                } else {
                    showToast('Password reset link sent to your email!', 'success');
                    closeForgotModal();
                }
            } catch (error) {
                showToast('Failed to send reset link. Please try again.', 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }
        
        // Enter key support for modal
        document.getElementById('reset-email').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                sendResetLink();
            }
        });
        
        // Close modal on overlay click
        document.getElementById('forgot-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeForgotModal();
            }
        });
        
        // Add focus effects
        emailInput.addEventListener('focus', () => {
            emailInput.classList.add('success');
        });
        
        emailInput.addEventListener('blur', () => {
            emailInput.classList.remove('success');
        });
        
        passwordInput.addEventListener('focus', () => {
            passwordInput.classList.add('success');
        });
        
        passwordInput.addEventListener('blur', () => {
            passwordInput.classList.remove('success');
        });
        
        // Check existing session
        checkExistingSession();
    </script>
</body>
</html>
