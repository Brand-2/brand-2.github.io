<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Wallet | Brand 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            min-height: 100vh;
        }
        
        .balance-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, rgba(5, 150, 105, 0.05) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 2rem;
        }
        
        .amount-card {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            border-radius: 1rem;
        }
        
        .amount-card:hover {
            transform: translateY(-4px);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);
        }
        
        .amount-card:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .transaction-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border-radius: 1rem;
        }
        
        .transaction-item:hover {
            border-color: rgba(16, 185, 129, 0.2);
        }
        
        .status-badge {
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 500;
        }
        
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .status-failed { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        @media (max-width: 640px) {
            .balance-card {
                padding: 1.5rem;
            }
            .balance-amount {
                font-size: 2.5rem;
            }
            .amount-card {
                padding: 1rem;
            }
        }
        
        .quick-select:active {
            transform: scale(0.95);
        }
        
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #10b981;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .commission-info {
            background: rgba(245, 158, 11, 0.05);
            border: 1px solid rgba(245, 158, 11, 0.15);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Navigation -->
    <nav class="bg-black/80 backdrop-blur-md border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3 cursor-pointer" onclick="goBack()">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                    <span class="text-xl font-black text-white">B</span>
                </div>
                <span class="text-lg font-bold text-white hidden sm:inline">Brand <span class="text-emerald-500">2</span></span>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-xs text-gray-400">Wallet</span>
                <button onclick="goBack()" class="px-3 py-1.5 bg-gray-800 rounded-lg text-white text-sm">
                    ← Dashboard
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 md:p-6">
        <!-- Balance Card -->
        <div class="balance-card p-6 md:p-8 mb-8">
            <div class="text-center">
                <p class="text-gray-400 text-sm mb-2">Available Balance</p>
                <div class="balance-amount text-5xl md:text-6xl font-black text-emerald-500 mb-2" id="wallet-balance">UGX 0</div>
                <div class="flex flex-wrap gap-2 justify-center">
                    <span class="text-xs text-gray-500">No minimum deposit required</span>
                    <span class="text-xs text-gray-600">|</span>
                    <span class="text-xs text-gray-500">Withdraw from UGX 5,000</span>
                </div>
                <div class="mt-3 commission-info">
                    <span class="text-xs text-yellow-500">⚡ 10% platform fee applies to all influence earnings</span>
                </div>
            </div>
        </div>

        <!-- Deposit Section -->
        <div class="mb-8">
            <h2 class="text-xl font-bold text-white mb-4">Deposit Funds</h2>
            <p class="text-gray-400 text-sm mb-4">Select an amount to deposit via LivePay</p>
            
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3" id="amount-grid">
                <!-- Amount buttons will be generated from config -->
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="window.location.href='withdraw.html'" class="btn-primary px-4 py-3 rounded-xl text-white font-semibold text-sm">
                🏦 Withdraw Funds
            </button>
            <button onclick="window.location.href='dashboard.html'" class="btn-secondary px-4 py-3 rounded-xl text-white font-semibold text-sm border border-gray-700">
                📊 Dashboard
            </button>
        </div>

        <!-- Transaction History -->
        <div class="bg-gray-900/50 rounded-2xl p-6 border border-gray-800">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-white">Recent Transactions</h2>
                <button onclick="refreshTransactions()" class="text-emerald-500 text-sm hover:text-emerald-400 transition">
                    🔄 Refresh
                </button>
            </div>
            <div id="transactions-list" class="space-y-3 max-h-96 overflow-y-auto">
                <div class="text-center text-gray-500 py-8">
                    <div class="loader"></div>
                    <p class="mt-2">Loading transactions...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3">
        <span id="toast-icon"></span>
        <span id="toast-message"></span>
    </div>

    <script>
        const SUPABASE_URL = 'https://kqyyhjudshjeztdlpmoa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxeXloanVkc2hqZXp0ZGxwbW9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNjAzMzEsImV4cCI6MjA5NTkzNjMzMX0.w8uypyF_qEp5nesKGro8x8lET7lI8rzU5MxsIKf_jxQ';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentUser = null;
        let currentProfile = null;
        
        // ============================================
        // PAYMENT LINKS CONFIGURATION
        // Replace these with your actual LivePay links
        // ============================================
        const PAYMENT_LINKS = {
            5000: 'https://livepay.me/pay?c=86f81c82a0fde4dc46b511608eb28a20',
            10000: 'https://livepay.me/pay?c=819ab73c5f3cd563f30b7b3bcf262ce9',
            20000: 'https://livepay.me/pay?c=8c8c2da41c7e79bea9ba1bf9b2cca831',
            30000: 'https://livepay.me/pay?c=e90b3387e9768a701a5048e3cd2f5668',
            50000: 'https://livepay.me/pay?c=YOUR_LIVEPAY_LINK_50000',
            100000: 'https://livepay.me/pay?c=YOUR_LIVEPAY_LINK_100000'
        };
        
        const AMOUNTS = Object.keys(PAYMENT_LINKS).map(Number).sort((a, b) => a - b);
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            document.getElementById('toast-icon').innerHTML = icons[type] || icons.info;
            document.getElementById('toast-message').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        function goBack() {
            window.location.href = 'dashboard.html';
        }
        
        function generateReference() {
            return `DEP-${Date.now()}-${Math.random().toString(36).substring(2, 8).toUpperCase()}`;
        }
        
        async function payWithLivePay(amount) {
            if (!currentUser) {
                showToast('Please login first', 'error');
                window.location.href = 'login.html';
                return;
            }
            
            const reference = generateReference();
            const link = PAYMENT_LINKS[amount];
            
            if (!link) {
                showToast('Payment link not found for this amount', 'error');
                return;
            }
            
            // Store in session for callback
            sessionStorage.setItem('pending_deposit', amount);
            sessionStorage.setItem('pending_reference', reference);
            sessionStorage.setItem('pending_user_id', currentUser.id);
            
            try {
                // Create pending transaction
                const { error: txError } = await sb
                    .from('transactions')
                    .insert({
                        user_id: currentUser.id,
                        amount: amount,
                        fee: 0,
                        net_amount: amount,
                        currency: 'UGX',
                        transaction_type: 'deposit',
                        status: 'pending',
                        reference: reference,
                        payment_method: 'livepay',
                        payment_link: link,
                        description: `LivePay deposit - UGX ${amount.toLocaleString()}`
                    });
                
                if (txError) {
                    console.error('Transaction creation error:', txError);
                    showToast('Error creating transaction. Please try again.', 'error');
                    return;
                }
                
                showToast(`Redirecting to LivePay for UGX ${amount.toLocaleString()}...`, 'info');
                
                // Redirect to LivePay after short delay
                setTimeout(() => {
                    window.location.href = link;
                }, 1000);
                
            } catch (error) {
                console.error('Payment error:', error);
                showToast('An error occurred. Please try again.', 'error');
            }
        }
        
        async function loadUserData() {
            const { data: { user } } = await sb.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            
            const { data: profile } = await sb
                .from('profiles')
                .select('*')
                .eq('id', user.id)
                .single();
            
            currentProfile = profile;
            
            // Update balance display
            document.getElementById('wallet-balance').textContent = `UGX ${(profile?.wallet_balance || 0).toLocaleString()}`;
            
            return profile;
        }
        
        function renderAmountButtons() {
            const grid = document.getElementById('amount-grid');
            
            const amountConfigs = {
                5000: { icon: '💳', label: 'Small' },
                10000: { icon: '💳', label: 'Standard' },
                20000: { icon: '💳', label: 'Medium' },
                30000: { icon: '💳', label: 'Large' },
                50000: { icon: '💳', label: 'XL' },
                100000: { icon: '💳', label: 'XXL' }
            };
            
            grid.innerHTML = AMOUNTS.map(amount => `
                <div onclick="payWithLivePay(${amount})" class="amount-card p-4 text-center">
                    <div class="text-3xl mb-2">${amountConfigs[amount]?.icon || '💳'}</div>
                    <div class="text-lg font-bold text-white">UGX ${amount.toLocaleString()}</div>
                    <div class="text-xs text-gray-500 mt-1">${amountConfigs[amount]?.label || ''}</div>
                    <div class="text-xs text-emerald-500 mt-2">Click to deposit</div>
                </div>
            `).join('');
        }
        
        async function loadTransactions() {
            if (!currentUser) return;
            
            const { data: transactions, error } = await sb
                .from('transactions')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false })
                .limit(20);
            
            if (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactions-list').innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <p>Error loading transactions</p>
                    </div>
                `;
                return;
            }
            
            if (!transactions || transactions.length === 0) {
                document.getElementById('transactions-list').innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        <div class="text-4xl mb-2">📭</div>
                        <p>No transactions yet</p>
                        <p class="text-xs mt-2">Deposit funds to get started</p>
                    </div>
                `;
                return;
            }
            
            const html = transactions.map(tx => {
                const isCredit = tx.transaction_type === 'deposit' || tx.transaction_type === 'reward';
                const color = isCredit ? 'text-emerald-500' : 'text-red-500';
                const prefix = isCredit ? '+' : '-';
                const icon = tx.transaction_type === 'deposit' ? '💰' : 
                            tx.transaction_type === 'reward' ? '🎁' : 
                            tx.transaction_type === 'withdrawal' ? '🏦' : '📊';
                
                const typeName = {
                    'deposit': 'Deposit',
                    'withdrawal': 'Withdrawal',
                    'reward': 'Influence Earnings',
                    'commission': 'Campaign Spend',
                    'ad_spend': 'Ad Spend'
                }[tx.transaction_type] || tx.transaction_type;
                
                const statusClass = tx.status === 'completed' ? 'status-completed' : 
                                   tx.status === 'pending' ? 'status-pending' : 'status-failed';
                
                // Show commission for reward transactions
                const commission = tx.commission_earned || (tx.transaction_type === 'reward' ? tx.amount * 0.10 : 0);
                
                return `
                    <div class="transaction-item p-4">
                        <div class="flex justify-between items-start">
                            <div class="flex items-start space-x-3">
                                <div class="text-2xl">${icon}</div>
                                <div>
                                    <div class="font-medium text-white">${typeName}</div>
                                    <div class="text-xs text-gray-500 mt-1">
                                        ${new Date(tx.created_at).toLocaleString()}
                                    </div>
                                    ${tx.reference ? `<div class="text-xs text-gray-600 font-mono mt-0.5">${tx.reference.substring(0, 15)}...</div>` : ''}
                                    ${commission > 0 && tx.transaction_type === 'reward' ? `
                                        <div class="text-xs text-yellow-500 mt-0.5">⚡ 10% fee: UGX ${commission.toLocaleString()}</div>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="font-bold ${color}">
                                    ${prefix} UGX ${tx.amount.toLocaleString()}
                                </div>
                                <div class="mt-1">
                                    <span class="status-badge ${statusClass}">${tx.status}</span>
                                </div>
                                ${tx.fee > 0 ? `<div class="text-xs text-gray-500 mt-1">Fee: UGX ${tx.fee.toLocaleString()}</div>` : ''}
                            </div>
                        </div>
                        ${tx.description ? `<div class="mt-2 text-xs text-gray-500 border-t border-gray-800 pt-2">${tx.description}</div>` : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('transactions-list').innerHTML = html;
        }
        
        function refreshTransactions() {
            loadTransactions();
            loadUserData();
            showToast('Refreshed!', 'success');
        }
        
        // Real-time subscriptions
        function subscribeToUpdates() {
            if (!currentUser) return;
            
            const subscription = sb
                .channel('wallet-updates')
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'transactions',
                    filter: `user_id=eq.${currentUser.id}`
                }, () => {
                    loadTransactions();
                    loadUserData();
                })
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'profiles',
                    filter: `id=eq.${currentUser.id}`
                }, () => {
                    loadUserData();
                })
                .subscribe();
            
            return subscription;
        }
        
        let subscription = null;
        
        // Check for pending payment on page load
        function checkPendingPayment() {
            const pendingAmount = sessionStorage.getItem('pending_deposit');
            const pendingRef = sessionStorage.getItem('pending_reference');
            
            if (pendingAmount && pendingRef) {
                // Check if payment was completed
                setTimeout(async () => {
                    const { data: tx } = await sb
                        .from('transactions')
                        .select('status')
                        .eq('reference', pendingRef)
                        .single();
                    
                    if (tx?.status === 'completed') {
                        showToast(`Deposit of UGX ${parseFloat(pendingAmount).toLocaleString()} completed!`, 'success');
                        sessionStorage.removeItem('pending_deposit');
                        sessionStorage.removeItem('pending_reference');
                        sessionStorage.removeItem('pending_user_id');
                        loadUserData();
                        loadTransactions();
                    } else if (tx?.status === 'failed') {
                        showToast('Payment failed. Please try again.', 'error');
                        sessionStorage.removeItem('pending_deposit');
                        sessionStorage.removeItem('pending_reference');
                        sessionStorage.removeItem('pending_user_id');
                    }
                }, 2000);
            }
        }
        
        // Initialize
        async function init() {
            await loadUserData();
            renderAmountButtons();
            await loadTransactions();
            subscription = subscribeToUpdates();
            checkPendingPayment();
        }
        
        init();
    </script>
</body>
</html>
